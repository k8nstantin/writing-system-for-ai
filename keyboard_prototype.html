<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Characteristica Keyboard Teaser</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #0b0e13;
    color: #c8cdd6;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 40px;
  }
  
  .teaser-text {
    text-align: center;
    margin-bottom: 40px;
  }
  
  .teaser-text h1 {
    font-size: 24px;
    color: #fff;
    margin-bottom: 10px;
  }
  
  .teaser-text p {
    color: #8aa6d4;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .keyboard {
    background: #161b24;
    padding: 24px;
    border-radius: 16px;
    border: 1px solid #2b3340;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .row {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .key {
    width: 54px;
    height: 54px;
    background: linear-gradient(180deg, #2b3340 0%, #1e2430 100%);
    border-radius: 8px;
    border: 1px solid #0b0e13;
    box-shadow: 0 4px 0 #0b0e13, inset 0 1px 1px rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  
  .key:active {
    transform: translateY(4px);
    box-shadow: 0 0px 0 #0b0e13, inset 0 1px 2px rgba(0,0,0,0.5);
  }

  .key svg {
    width: 24px;
    height: 24px;
    stroke: #e2e8f0;
  }
  
  .key .handle {
    position: absolute;
    bottom: 4px;
    font-size: 9px;
    color: #5d626c;
    letter-spacing: 0.05em;
  }
  
  /* Category Colors for Key Borders/Accents to show logic */
  .key.entity { border-top: 2px solid #7fcf9f; }
  .key.action { border-top: 2px solid #ff8a6b; }
  .key.mental { border-top: 2px solid #a388ed; }
  .key.space  { border-top: 2px solid #8aa6d4; }
  .key.macro  { border-top: 2px solid #ffd166; }

  .key.wide { width: 80px; }
  .key.spacebar { width: 300px; }
  
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 30px;
    font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>

<div class="teaser-text">
  <h1>A Keyboard for Pure Meaning</h1>
  <p>No Alphabet. Only Concepts.</p>
</div>

<div class="keyboard">
  <!-- ROW 1: Numbers & Logic -->
  <div class="row" style="padding-left: 0px;">
    <div class="key"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linejoin="round"><line x1="4" y1="4" x2="20" y2="20" stroke-width="3" /><line x1="20" y1="4" x2="4" y2="20" stroke-width="3" /></svg><span class="handle">not</span></div>
    <div class="key"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="2" fill="#e2e8f0" /></svg><span class="handle">one</span></div>
    <div class="key"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="8" cy="12" r="2" fill="#e2e8f0" /><circle cx="16" cy="12" r="2" fill="#e2e8f0" /></svg><span class="handle">two</span></div>
    <div class="key"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="8" r="1.5" fill="#e2e8f0" /><circle cx="7" cy="15" r="1.5" fill="#e2e8f0" /><circle cx="17" cy="15" r="1.5" fill="#e2e8f0" /></svg><span class="handle">few</span></div>
    <div class="key"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-dasharray="4,4" /></svg><span class="handle">som</span></div>
    <div class="key"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10" fill="#e2e8f0" /></svg><span class="handle">al</span></div>
    <div class="key"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M 12 20 V 12 L 6 4 M 12 12 L 18 4" /></svg><span class="handle">if</span></div>
    <div class="key"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polygon points="12,2 21,7 21,17 12,22 3,17 3,7" /></svg><span class="handle">bik</span></div>
    <div class="key wide" style="color:#5d626c; font-size:12px; font-weight:bold;">BACK</div>
  </div>

  <!-- ROW 2: Actions & Events (Triangles) -->
  <div class="row" style="padding-left: 20px;">
    <div class="key wide" style="color:#5d626c; font-size:12px; font-weight:bold;">TAB</div>
    <div class="key action"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polygon points="12,2 2,20 22,20" /></svg><span class="handle">do</span></div>
    <div class="key action"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polygon points="2,4 22,4 12,22" /></svg><span class="handle">hap</span></div>
    <div class="key action"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="4" y1="12" x2="20" y2="12" /><polyline points="10,6 4,12 10,18" /><polyline points="14,6 20,12 14,18" /></svg><span class="handle">mov</span></div>
    <div class="key action"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polygon points="12,2 2,20 22,20" /><circle cx="12" cy="14" r="2" fill="#e2e8f0"/></svg><span class="handle">liv</span></div>
    <div class="key action"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polygon points="2,4 22,4 12,22" /><circle cx="12" cy="10" r="2" fill="#e2e8f0"/></svg><span class="handle">die</span></div>
    <div class="key action"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polygon points="8,4 8,20 20,12" /></svg><span class="handle">sai</span></div>
    <div class="key"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="4" y="4" width="16" height="16" fill="#e2e8f0" /></svg><span class="handle">tru</span></div>
  </div>

  <!-- ROW 3: Entities (Circles) - The Home Row -->
  <div class="row" style="padding-left: 30px;">
    <div class="key wide" style="color:#5d626c; font-size:12px; font-weight:bold;">CAPS</div>
    <div class="key entity"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="4" fill="#e2e8f0" /></svg><span class="handle">me</span></div>
    <div class="key entity"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="4" /></svg><span class="handle">yu</span></div>
    <div class="key entity"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10" /></svg><span class="handle">qen</span></div>
    <div class="key entity"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10" /><line x1="6" y1="12" x2="18" y2="12" /></svg><span class="handle">ren</span></div>
    <div class="key entity"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10" /><circle cx="12" cy="7" r="1.5" fill="#e2e8f0"/><circle cx="8" cy="14" r="1.5" fill="#e2e8f0"/><circle cx="16" cy="14" r="1.5" fill="#e2e8f0"/></svg><span class="handle">ppl</span></div>
    <div class="key entity"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10" /><line x1="12" y1="2" x2="12" y2="22" /></svg><span class="handle">bod</span></div>
    <div class="key macro"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polygon points="12,2 21,7 21,17 12,22 3,17 3,7" /><circle cx="12" cy="12" r="3" fill="#e2e8f0" /></svg><span class="handle">unv</span></div>
    <div class="key wide" style="color:#5d626c; font-size:12px; font-weight:bold;">ENTER</div>
  </div>

  <!-- ROW 4: Mental & Space -->
  <div class="row" style="padding-left: 10px;">
    <div class="key wide" style="color:#5d626c; font-size:12px; font-weight:bold;">SHIFT</div>
    <div class="key mental"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linejoin="round"><polygon points="12,2 22,12 12,22 2,12" /><circle cx="12" cy="12" r="2" fill="#e2e8f0" /></svg><span class="handle">tnk</span></div>
    <div class="key mental"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linejoin="round"><polygon points="12,2 22,12 12,22 2,12" fill="#e2e8f0"/></svg><span class="handle">noe</span></div>
    <div class="key mental"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linejoin="round"><polygon points="12,2 22,12 12,22 2,12" /><line x1="12" y1="12" x2="24" y2="12" /><polyline points="20,8 24,12 20,16" /></svg><span class="handle">wnt</span></div>
    <div class="key space"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="2" y1="20" x2="22" y2="20" /><line x1="12" y1="20" x2="12" y2="2" /><circle cx="12" cy="12" r="3" fill="#e2e8f0" /></svg><span class="handle">loc</span></div>
    <div class="key space"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22" /><rect x="4" y="8" width="6" height="8" fill="#e2e8f0" /></svg><span class="handle">lft</span></div>
    <div class="key space"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22" /><rect x="14" y="8" width="6" height="8" fill="#e2e8f0" /></svg><span class="handle">rgt</span></div>
    <div class="key wide" style="color:#5d626c; font-size:12px; font-weight:bold;">SHIFT</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background: #7fcf9f;"></div> Entities</div>
  <div class="legend-item"><div class="dot" style="background: #ff8a6b;"></div> Actions</div>
  <div class="legend-item"><div class="dot" style="background: #a388ed;"></div> Mental</div>
  <div class="legend-item"><div class="dot" style="background: #8aa6d4;"></div> Space</div>
  <div class="legend-item"><div class="dot" style="background: #ffd166;"></div> Macro</div>
</div>

</body>
</html>
