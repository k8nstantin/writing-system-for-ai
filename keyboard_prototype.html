<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan Universal Keyboard Teaser</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #0b0e13;
    color: #c8cdd6;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 40px 40px 80px 40px;
    box-sizing: border-box;
    overflow: hidden;
  }
  
  .teaser-text {
    text-align: center;
    margin-bottom: 40px;
  }
  
  .teaser-text h1 {
    font-size: 24px;
    color: #fff;
    margin-bottom: 10px;
  }
  
  .teaser-text p {
    color: #8aa6d4;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .split-keyboard {
    display: flex;
    justify-content: center;
    gap: 60px; /* The physical split */
    align-items: flex-end;
  }

  .half {
    background: #161b24;
    padding: 24px;
    border-radius: 16px;
    border: 1px solid #2b3340;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Ergonomic slanting */
  .half.left { transform: rotate(4deg); }
  .half.right { transform: rotate(-4deg); }

  .row {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .key {
    width: 50px;
    height: 50px;
    background: linear-gradient(180deg, #2b3340 0%, #1e2430 100%);
    border-radius: 8px;
    border: 1px solid #0b0e13;
    box-shadow: 0 4px 0 #0b0e13, inset 0 1px 1px rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  
  .key:active {
    transform: translateY(4px);
    box-shadow: 0 0px 0 #0b0e13, inset 0 1px 2px rgba(0,0,0,0.5);
  }

  .key svg {
    width: 22px;
    height: 22px;
    stroke: #e2e8f0;
  }
  
  .key .handle {
    position: absolute;
    bottom: 3px;
    font-size: 9px;
    color: #5d626c;
    letter-spacing: 0.05em;
  }
  
  /* Category Colors */
  .key.entity { border-top: 2px solid #7fcf9f; } /* Green */
  .key.action { border-top: 2px solid #ff8a6b; } /* Orange */
  .key.mental { border-top: 2px solid #a388ed; } /* Purple */
  .key.space  { border-top: 2px solid #8aa6d4; } /* Blue */
  .key.desc   { border-top: 2px solid #f67280; } /* Pink/Red */
  .key.logic  { border-top: 2px solid #ffd166; } /* Yellow */
  .key.time   { border-top: 2px solid #48b5c4; } /* Cyan */
  .key.num    { border-top: 2px solid #e2e8f0; } /* White/Silver */
  .key.role   { border-top: 2px solid #f0f4f8; } /* White/Grey */

  .key.wide { width: 70px; }
  .key.tall { height: 108px; } /* For thumb clusters */
  
  .thumb-cluster {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .thumb-cluster.left { justify-content: flex-end; padding-right: 10px; }
  .thumb-cluster.right { justify-content: flex-start; padding-left: 10px; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 50px;
    font-size: 12px;
    max-width: 800px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }

  /* Hide scrollbars completely while keeping scroll functionality */
  body::-webkit-scrollbar {
    display: none;
  }
  body {
    -ms-overflow-style: none;  /* IE and Edge */
    scrollbar-width: none;  /* Firefox */
  }

  .output-display {
    width: 100%;
    max-width: 800px;
    min-height: 80px;
    background: #0f131a;
    border: 1px solid #2b3340;
    border-radius: 12px;
    margin-bottom: 40px;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    flex-wrap: wrap;
    gap: 12px;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
  }

  .output-display svg {
    width: 32px;
    height: 32px;
    stroke: #e2e8f0;
  }

  .cursor {
    width: 2px;
    height: 32px;
    background: #8aa6d4;
    animation: blink 1s step-end infinite;
  }
  
  @keyframes blink { 50% { opacity: 0; } }

  /* Responsive Design for smaller iframes/screens */
  @media (max-width: 1000px) {
    .split-keyboard {
      gap: 30px;
      transform: scale(0.85);
    }
    .half.left { transform: rotate(2deg); }
    .half.right { transform: rotate(-2deg); }
  }
  @media (max-width: 800px) {
    .split-keyboard {
      transform: scale(0.65);
      gap: 20px;
    }
    .half.left { transform: rotate(0deg); }
    .half.right { transform: rotate(0deg); }
  }
  @media (max-width: 600px) {
    .split-keyboard {
      transform: scale(0.45);
      gap: 10px;
    }
  }
</style>
</head>

<script>
  const output = document.getElementById('output');
  const cursor = document.getElementById('cursor');
  const keys = document.querySelectorAll('.key');

  keys.forEach(key => {
    key.addEventListener('click', () => {
      // Handle special keys
      const action = key.getAttribute('data-action');
      if (action === 'BACK') {
        if (output.children.length > 1) { // 1 is the cursor
          output.removeChild(output.children[output.children.length - 2]);
        }
        return;
      }
      if (action) {
        return; // Ignore other modifiers for now
      }

      // Clone the SVG from the key
      const svg = key.querySelector('svg');
      if (svg) {
        const clone = svg.cloneNode(true);
        // Insert before the cursor
        output.insertBefore(clone, cursor);
      }
    });
  });
</script>
